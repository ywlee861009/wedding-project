<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💍 3D Wedding Journey - Modular Version</title>
    
    <!-- Import Map: 현대적인 브라우저에서 모듈 경로 관리 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    
    <!-- Three.js (Module Version) -->
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; }
        #ui-overlay {
            position: fixed; top: 20px; left: 20px; color: #333;
            background: rgba(255, 255, 255, 0.85); padding: 15px;
            border-radius: 12px; font-family: sans-serif; z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            pointer-events: none; /* 클릭 방해 금지 */
        }
        #status-log { font-size: 12px; color: #0077ff; font-weight: bold; margin-top: 5px; }

        /* 모바일 터치 컨트롤 스타일 */
        #mobile-controls {
            position: fixed; bottom: 30px; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 0 30px; z-index: 200; pointer-events: none;
        }
        .joystick-area {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            pointer-events: auto;
        }
        .touch-btn {
            width: 60px; height: 60px; border-radius: 50%; border: none;
            background: rgba(255, 255, 255, 0.3); color: white;
            font-size: 24px; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); backdrop-filter: blur(5px);
        }
        .touch-btn:active { background: rgba(255, 255, 255, 0.6); transform: scale(0.9); }
        .jump-btn {
            width: 80px; height: 80px; background: rgba(0, 170, 255, 0.4);
            font-size: 16px; pointer-events: auto;
        }
        .jump-btn:active { background: rgba(0, 170, 255, 0.7); }

        @media (max-width: 768px) {
            #pc-instruction { display: none; }
        }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <h2 style="margin:0">💍 결혼이란..</h2>
        <p id="pc-instruction" style="margin:5px 0">WASD: 이동 | Space: 점프</p>
        <div id="status-log">시스템 로드 중...</div>
    </div>

    <!-- 모바일 터치 컨트롤러 -->
    <div id="mobile-controls" style="display: none;">
        <div class="joystick-area">
            <button id="btn-up" class="touch-btn">▲</button>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button id="btn-left" class="touch-btn">◀</button>
                <button id="btn-down" class="touch-btn">▼</button>
                <button id="btn-right" class="touch-btn">▶</button>
            </div>
        </div>
        <button id="btn-jump" class="touch-btn jump-btn">JUMP</button>
    </div>

    <!-- 엔트리 포인트: Module 방식 -->
    <script type="module" src="main.js"></script>
</body>
</html>
