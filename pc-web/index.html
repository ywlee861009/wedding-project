<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💍 Wedding Invitation | Our Journey</title>
    <!-- Tailwind CSS (CDN for rapid styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Pixi.js (The powerful 2D engine) -->
    <script src="https://pixijs.download/v8.5.2/pixi.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 overflow-hidden font-sans">

    <!-- Game Canvas Container -->
    <div id="game-container" class="w-screen h-screen"></div>

    <!-- UI Overlay: Time & Date -->
    <div class="fixed top-10 left-1/2 -translate-x-1/2 z-10 text-center pointer-events-none">
        <div class="bg-white/80 backdrop-blur-md px-6 py-3 rounded-full shadow-lg border border-gray-100">
            <span id="current-date" class="text-2xl font-serif text-gray-800 tracking-widest italic">2018. 02. 15</span>
        </div>
        <div class="mt-2 text-xs text-gray-400 uppercase tracking-widest">Since our first meet at Doksan</div>
    </div>

    <!-- Bottom Instructions -->
    <div class="fixed bottom-10 left-1/2 -translate-x-1/2 z-10 text-center pointer-events-none opacity-50">
        <div class="text-sm text-gray-500 font-light tracking-widest">USE MOUSE WHEEL OR SCROLL TO TRAVEL THROUGH OUR STORY</div>
    </div>

    <!-- Main Logic -->
    <script src="js/game.js"></script>
</body>
</html>
