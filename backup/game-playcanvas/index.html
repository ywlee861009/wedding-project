<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💍 Wedding Journey — PlayCanvas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- PlayCanvas 렌더링 캔버스 -->
    <canvas id="application-canvas"></canvas>

    <!-- 상태 표시 -->
    <div id="status-log">🔄 PlayCanvas 로딩 중...</div>

    <!-- 대화 박스 -->
    <div id="dialogue-box">
        <div id="dialogue-speaker"></div>
        <div id="dialogue-text"></div>
        <div id="dialogue-hint">[ F / E / 탭 ] 계속</div>
    </div>

    <!-- 신부 근처 상호작용 버튼 (모바일) -->
    <button id="interact-btn">💬 대화</button>

    <!-- 모바일 조이스틱 -->
    <div id="joystick-base">
        <div id="joystick-knob"></div>
    </div>

    <!-- 모바일 점프 버튼 -->
    <button id="btn-jump">↑</button>

    <!--
        PlayCanvas Engine (stable)
        https://developer.playcanvas.com/api/
    -->
    <script src="https://code.playcanvas.com/playcanvas-stable.min.js"></script>

    <!-- 게임 스크립트 로드 순서 중요 -->
    <script src="config.js"></script>
    <script src="scripts/terrain.js"></script>
    <script src="scripts/camera.js"></script>
    <script src="scripts/player.js"></script>
    <script src="main.js"></script>
</body>
</html>
