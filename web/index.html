<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💍 Wedding Journey | Our 8-Year Story</title>
    
    <!-- 1. Fonts (Libre Baskerville for dates, Noto Sans for UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- 2. Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 3. Pixi.js (V8) -->
    <script src="https://pixijs.download/v8.5.2/pixi.min.js"></script>

    <!-- 4. Global Styles -->
    <style>
        body {
            background-color: #050508;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Noto Sans KR', sans-serif;
            user-select: none;
        }
        #game-canvas {
            display: block;
        }
        .date-display {
            font-family: 'Libre Baskerville', serif;
        }
        /* Loading Screen Style */
        #loader {
            position: fixed;
            inset: 0;
            background: #050508;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 1s ease-out;
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="text-white text-center">
            <div class="text-2xl font-serif italic mb-4 tracking-widest">Our Journey</div>
            <div class="w-48 h-[1px] bg-white/20 relative overflow-hidden">
                <div id="loading-bar" class="absolute inset-y-0 left-0 bg-white transition-all duration-300 w-0"></div>
            </div>
        </div>
    </div>

    <!-- UI Overlay (Date Display) -->
    <div id="ui-overlay" class="fixed top-12 left-1/2 -translate-x-1/2 z-50 text-center pointer-events-none opacity-0 transition-opacity duration-1000">
        <div class="bg-black/40 backdrop-blur-xl px-10 py-4 rounded-full border border-white/10 shadow-2xl">
            <span id="current-date" class="date-display text-4xl text-white tracking-[0.2em] italic">2018. 02. 15</span>
        </div>
        <div id="location-hint" class="mt-4 text-xs text-white/40 uppercase tracking-[0.5em] font-light">The Beginning at Doksan Station</div>
    </div>

    <!-- Travel Instructions -->
    <div class="fixed bottom-12 left-1/2 -translate-x-1/2 z-50 text-center pointer-events-none opacity-0 transition-opacity duration-2000 delay-1000" id="scroll-hint">
        <div class="text-[10px] text-white/30 uppercase tracking-[0.6em]">Scroll down to travel forward in time</div>
    </div>

    <!-- Canvas Container -->
    <div id="game-container"></div>

    <!-- Application Module Entry -->
    <script type="module" src="js/main.js"></script>

</body>
</html>
