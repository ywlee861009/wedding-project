<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ 3D Marble Runner</title>
    <!-- Global Three.js (No Module Issues) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        canvas { display: block; }
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #0ff;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border: 1px solid #0ff;
            border-radius: 10px;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #score { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        #controls { font-size: 12px; color: #fff; opacity: 0.7; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">SCORE: 000</div>
        <div id="controls">WASD: MOVE | SPACE: JUMP</div>
    </div>
    
    <script>
        // --- 1. SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.Fog(0x050510, 5, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- 2. LIGHTS ---
        const ambient = new THREE.AmbientLight(0x404040, 1); // 부드러운 주변광
        scene.add(ambient);

        const pointLight = new THREE.PointLight(0x00ffff, 2, 20); // 공에서 나는 빛
        pointLight.castShadow = true;
        scene.add(pointLight);

        const sun = new THREE.DirectionalLight(0xff00ff, 0.5); // 보라색 햇빛
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun);

        // --- 3. OBJECTS ---
        // 바닥 (Grid)
        const gridHelper = new THREE.GridHelper(200, 100, 0xff00ff, 0x222244);
        scene.add(gridHelper);

        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // 공 (The Player)
        const ballGeo = new THREE.SphereGeometry(0.5, 32, 32);
        const ballMat = new THREE.MeshStandardMaterial({ 
            color: 0x00ffff, 
            emissive: 0x00ffff, 
            emissiveIntensity: 0.5,
            roughness: 0.1,
            metalness: 0.5
        });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.position.y = 0.5;
        ball.castShadow = true;
        scene.add(ball);

        // 장애물들 (Cubes)
        const obstacles = [];
        for(let i = 0; i < 40; i++) {
            const h = 1 + Math.random() * 5;
            const cubeGeo = new THREE.BoxGeometry(1, h, 1);
            const cubeMat = new THREE.MeshStandardMaterial({ color: 0xff00ff });
            const cube = new THREE.Mesh(cubeGeo, cubeMat);
            cube.position.set(
                (Math.random() - 0.5) * 40,
                h/2,
                (Math.random() - 0.5) * 40
            );
            cube.castShadow = true;
            cube.receiveShadow = true;
            scene.add(cube);
            obstacles.push(cube);
        }

        // --- 4. LOGIC & INPUT ---
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        let velX = 0, velZ = 0, velY = 0;
        const accel = 0.01, friction = 0.95, gravity = -0.01;
        let score = 0;

        function animate() {
            requestAnimationFrame(animate);

            // 이동
            if (keys['KeyW'] || keys['ArrowUp']) velZ -= accel;
            if (keys['KeyS'] || keys['ArrowDown']) velZ += accel;
            if (keys['KeyA'] || keys['ArrowLeft']) velX -= accel;
            if (keys['KeyD'] || keys['ArrowRight']) velX += accel;

            // 마찰 및 물리
            velX *= friction;
            velZ *= friction;
            velY += gravity;

            ball.position.x += velX;
            ball.position.z += velZ;
            ball.position.y += velY;

            // 바닥 충돌
            if (ball.position.y < 0.5) {
                ball.position.y = 0.5;
                velY = 0;
                if (keys['Space']) velY = 0.25; // 점프
            }

            // 공 회전 애니메이션
            ball.rotation.x += velZ * 2;
            ball.rotation.z -= velX * 2;

            // 포인트 라이트가 공을 따라다님
            pointLight.position.copy(ball.position);
            pointLight.position.y += 1;

            // 카메라가 부드럽게 공을 따라다님 (3인칭)
            const camTarget = new THREE.Vector3(ball.position.x, ball.position.y + 3, ball.position.z + 8);
            camera.position.lerp(camTarget, 0.1);
            camera.lookAt(ball.position);

            // 점수 (그냥 거리 기반)
            score = Math.floor(Math.abs(ball.position.x) + Math.abs(ball.position.z));
            document.getElementById('score').innerText = 'SCORE: ' + score.toString().padStart(3, '0');

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
